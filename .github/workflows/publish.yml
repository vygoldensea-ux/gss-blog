name: GSS Blog Publisher

on:
  push:
    branches: [main]
    paths:
      - "output.html"
      - "output.meta"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Read meta file
        id: meta
        run: |
          set -a
          source output.meta
          set +a
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "type=${TYPE}" >> $GITHUB_OUTPUT
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT
          echo "excerpt=${EXCERPT}" >> $GITHUB_OUTPUT
          echo "lang=${LANG:-en}" >> $GITHUB_OUTPUT
          echo "image_queries=${IMAGE_QUERIES}" >> $GITHUB_OUTPUT
          echo "publish=${PUBLISH:-true}" >> $GITHUB_OUTPUT

      - name: Create .env
        run: |
          printf 'WP_SITE_URL=%s\n' "${{ secrets.WP_SITE_URL }}" > .env
          printf 'WP_USERNAME=%s\n' "${{ secrets.WP_USERNAME }}" >> .env
          printf 'WP_APP_PASSWORD=%s\n' "${{ secrets.WP_APP_PASSWORD }}" >> .env
          printf 'KIE_API_KEY=%s\n' "${{ secrets.KIE_API_KEY }}" >> .env
          printf 'UNSPLASH_ACCESS_KEY=%s\n' "${{ secrets.UNSPLASH_ACCESS_KEY }}" >> .env
          printf 'PEXELS_API_KEY=%s\n' "${{ secrets.PEXELS_API_KEY }}" >> .env
          printf 'GSS_CONTACT_URL=https://goldenseastudios.com/contact-us/\n' >> .env
          printf 'GSS_COMPANY_NAME=Golden Sea Studios\n' >> .env
          printf 'GSS_CTA_TAGLINE=We have helped 30+ startups ship AI mobile and game products from Vietnam\n' >> .env

      - name: Publish to WordPress
        run: |
          CMD="python main.py --file output.html --skip-validate"
          CMD="$CMD --title '${{ steps.meta.outputs.title }}'"
          CMD="$CMD --type ${{ steps.meta.outputs.type }}"
          CMD="$CMD --category ${{ steps.meta.outputs.category }}"
          CMD="$CMD --lang ${{ steps.meta.outputs.lang }}"

          if [ -n "${{ steps.meta.outputs.slug }}" ]; then
            CMD="$CMD --slug '${{ steps.meta.outputs.slug }}'"
          fi
          if [ -n "${{ steps.meta.outputs.excerpt }}" ]; then
            CMD="$CMD --excerpt '${{ steps.meta.outputs.excerpt }}'"
          fi
          if [ -n "${{ steps.meta.outputs.tags }}" ]; then
            CMD="$CMD --tags ${{ steps.meta.outputs.tags }}"
          fi
          if [ -n "${{ steps.meta.outputs.image_queries }}" ]; then
            IQ=$(echo "${{ steps.meta.outputs.image_queries }}" | tr '|' ' ')
            CMD="$CMD --image-queries $IQ"
          fi
          if [ "${{ steps.meta.outputs.publish }}" = "true" ]; then
            CMD="$CMD --publish"
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Clean up and push
        if: success()
        run: |
          git config user.email "bot@goldenseastudios.com"
          git config user.name "GSS Publisher Bot"
          rm -f output.html output.meta
          git add -A
          git diff --cached --quiet || git commit -m "published: ${{ steps.meta.outputs.slug }}"
          git push origin main
