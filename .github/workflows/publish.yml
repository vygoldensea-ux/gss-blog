name: GSS Blog Publisher

on:
  push:
    branches: [main]
    paths:
      - "output.html"
      - "output.meta"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          printf 'WP_SITE_URL=%s\n'          "${{ secrets.WP_SITE_URL }}"          > .env
          printf 'WP_USERNAME=%s\n'          "${{ secrets.WP_USERNAME }}"          >> .env
          printf 'WP_APP_PASSWORD=%s\n'      "${{ secrets.WP_APP_PASSWORD }}"      >> .env
          printf 'KIE_API_KEY=%s\n'          "${{ secrets.KIE_API_KEY }}"          >> .env
          printf 'UNSPLASH_ACCESS_KEY=%s\n'  "${{ secrets.UNSPLASH_ACCESS_KEY }}"  >> .env
          printf 'PEXELS_API_KEY=%s\n'       "${{ secrets.PEXELS_API_KEY }}"       >> .env
          printf 'GSS_CONTACT_URL=https://goldenseastudios.com/contact-us/\n'      >> .env
          printf 'GSS_COMPANY_NAME=Golden Sea Studios\n'                           >> .env
          printf 'GSS_CTA_TAGLINE=We have helped 30+ startups ship products\n'    >> .env

      - name: Publish via Python
        run: |
          python3 << 'PYEOF'
          import re, subprocess, sys, os

          # Đọc meta
          with open("output.meta") as f:
              raw = f.read()

          def get(key, default=""):
              m = re.search(rf'^{key}\s*=\s*["\']?(.*?)["\']?\s*$', raw, re.MULTILINE)
              if not m:
                  return default
              v = m.group(1).strip().strip('"\'')
              return v

          title    = get("TITLE")
          typ      = get("TYPE", "insight")
          category = get("CATEGORY", "blog")
          tags     = get("TAGS", "").split()
          slug     = get("SLUG")
          excerpt  = get("EXCERPT")
          lang     = get("LANG", "en")
          iq_raw   = get("IMAGE_QUERIES")
          publish  = get("PUBLISH", "true").lower() == "true"

          if not title:
              print("❌ TITLE trống trong output.meta")
              sys.exit(1)

          print(f"Title   : {title}")
          print(f"Type    : {typ}")
          print(f"Category: {category}")
          print(f"Tags    : {tags}")
          print(f"Slug    : {slug}")
          print(f"Lang    : {lang}")
          print(f"Publish : {publish}")

          cmd = [
              "python", "main.py",
              "--file", "output.html",
              "--title", title,
              "--type", typ,
              "--category", category,
              "--lang", lang,
              "--skip-validate",
          ]

          if slug:
              cmd += ["--slug", slug]
          if excerpt:
              cmd += ["--excerpt", excerpt]
          if tags:
              cmd += ["--tags"] + tags
          if iq_raw:
              queries = [q.strip() for q in iq_raw.replace("|", " ").split() if q.strip()]
              if queries:
                  cmd += ["--image-queries"] + queries
          if publish:
              cmd += ["--publish"]

          print("\n▶ Running:", " ".join(cmd[:6]), "...")
          result = subprocess.run(cmd)
          sys.exit(result.returncode)
          PYEOF

      - name: Clean up and push
        if: success()
        run: |
          git config user.email "bot@goldenseastudios.com"
          git config user.name "GSS Publisher Bot"
          rm -f output.html output.meta
          git add -A
          git diff --cached --quiet || git commit -m "published: $(grep '^SLUG' output.meta 2>/dev/null | head -1 | cut -d= -f2 | tr -d '\"' || echo 'post')"
          git push origin main
